<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2026">
<meta name="theme-color" content="#0D0D0D">
<title>2026: Designed</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0D0D0D;
    --cream: #F4EFE4;
    --cream-dim: #E8E1D2;
    --gold: #C9A84C;
    --gold-dim: #8A6F2E;
    --muted: #6B6458;
    --border: #2A2520;
    --section-bg: #141210;
    --input-bg: #1A1714;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--cream);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.7;
  }

  /* Progress Bar */
  #progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: var(--gold);
    transition: width 0.4s ease;
    z-index: 100;
  }

  /* Nav */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 40px;
    padding-top: max(18px, env(safe-area-inset-top));
    z-index: 50;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #1E1A16;
  }
